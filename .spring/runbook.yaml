spring: "1.0"

name: Pokemon Demo App
description: Next.js Pokemon viewer using PokeAPI

prerequisites:
  - name: Node.js (v18+)
    check: "node --version"
    required: true

steps:
  - name: Kill port 3000 if in use
    run: npx kill-port 3000 || true
    optional: true
  - name: Install dependencies
    run: npm install
  - name: Start development server
    run: npm run dev
    background: true
    ready_when:
      type: http
      url: "http://localhost:3000"
      timeout: "180s"
