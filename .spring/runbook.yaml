spring: "1.0"

name: Pokemon Pokedex Demo
description: Next.js 16 Pokemon viewer app that fetches from PokeAPI

prerequisites:
  - name: Node.js (v20+)
    check: "node --version | grep -E \"v(20|21|22|23)\\.\" || (echo \"Node.js v20+ required\" && exit 1)"
    required: true

steps:
  - name: Kill port if in use
    run: npx kill-port 3000 || true
    optional: true
  - name: Install dependencies
    run: npm install
  - name: Start development server
    run: npm run dev
    background: true
    ready_when:
      type: http
      url: "http://localhost:3000"
      timeout: "180s"
